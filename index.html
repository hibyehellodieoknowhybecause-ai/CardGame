<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="CardGame" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="theme-color" content="#111318" />
    <title>Creature Card Backbone</title>
    <link rel="stylesheet" href="styles.css?v=7" />
  </head>
  <body>
    <div class="app-shell" id="homeScene">
      <div class="home-art" aria-hidden="true">
        <div class="home-art-image"></div>
        <div class="cloud-layer cloud-layer-back"></div>
        <div class="cloud-layer cloud-layer-front"></div>
        <div class="magic-glow glow-oracle"></div>
        <div class="magic-glow glow-gate"></div>
        <div class="magic-glow glow-obelisk"></div>
      </div>

      <header class="top-bar">
        <div>
          <p class="eyebrow">Mythic Card Realm</p>
          <h1>Card Forge</h1>
        </div>
        <div class="resource-strip" aria-label="Summoning resources">
          <span id="basicTickets">Basic Tickets: 20</span>
          <span id="mysticTickets">Mystic Tickets: 8</span>
        </div>
      </header>

      <main class="main-menu" aria-label="Main menu">
        <button
          class="map-entry summon-entry"
          id="openSummon"
          data-layout-id="summoning"
          type="button"
          style="--x: 52%; --y: 78%; --w: 9.5rem; --h: 8.5rem; --label-y: 2.25rem"
        >
          <span class="map-caption">Summoning</span>
        </button>
        <button
          class="map-entry collection-entry"
          id="openCollection"
          data-layout-id="monsters"
          type="button"
          style="--x: 23%; --y: 49%; --w: 10rem; --h: 8.75rem; --label-y: 2.4rem"
        >
          <span class="map-caption">Monsters</span>
        </button>
        <button
          class="map-entry locked-entry"
          id="openForge"
          data-layout-id="forge"
          type="button"
          style="--x: 72%; --y: 34%; --w: 10rem; --h: 8.25rem; --label-y: 2.35rem"
          aria-disabled="true"
        >
          <span class="map-caption">Forge</span>
        </button>
        <button
          class="map-entry locked-entry"
          id="openTrials"
          data-layout-id="trials"
          type="button"
          style="--x: 72%; --y: 61%; --w: 8rem; --h: 8rem; --label-y: 2.25rem"
          aria-disabled="true"
        >
          <span class="map-caption">Trials</span>
        </button>
      </main>

      <nav class="bottom-nav" aria-label="Primary navigation">
        <button type="button" class="active">Home</button>
        <button type="button" id="navSummon">Summon</button>
        <button type="button" id="navCollection">Monsters</button>
      </nav>

      <aside class="layout-editor" id="layoutEditor" aria-label="Layout editor">
        <button type="button" id="toggleLayoutEdit" aria-pressed="false">Edit Layout</button>
        <button type="button" id="saveLayout" disabled>Save</button>
        <button type="button" id="publishLayout" disabled>Save + GitHub</button>
        <span id="layoutStatus">Layout ready</span>
      </aside>
    </div>

    <section class="summon-menu" id="summonMenu" aria-hidden="true" aria-label="Summoning menu">
      <div class="summon-panel">
        <div class="panel-header">
          <div>
            <p class="eyebrow">Summoning Gate</p>
            <h2>Choose a Pack</h2>
          </div>
          <button class="icon-button" id="closeSummon" type="button" aria-label="Close summoning menu">x</button>
        </div>

        <div class="pack-grid" id="packGrid"></div>

        <div class="result-area">
          <div class="result-header">
            <h3>Latest Summons</h3>
            <span id="collectionCount">Collection: 0</span>
          </div>
          <div class="card-row" id="summonResults">
            <p class="empty-state">Open a pack to reveal placeholder creature cards.</p>
          </div>
        </div>
      </div>
    </section>

    <section class="summon-menu" id="collectionMenu" aria-hidden="true" aria-label="Monster collection">
      <div class="summon-panel collection-panel">
        <div class="panel-header">
          <div>
            <p class="eyebrow">Monster Box</p>
            <h2>Your Monsters</h2>
          </div>
          <button class="icon-button" id="closeCollection" type="button" aria-label="Close monster collection">x</button>
        </div>

        <div class="collection-tools" aria-label="Collection sorting controls">
          <label>
            <span>Sort by</span>
            <select id="collectionSortField">
              <option value="element">Attribute</option>
              <option value="naturalStars">Stars</option>
              <option value="level">Level</option>
              <option value="atk">ATK</option>
              <option value="spd">SPD</option>
              <option value="def">DEF</option>
              <option value="hp">HP</option>
            </select>
          </label>

          <div class="direction-toggle" role="group" aria-label="Sort direction">
            <button type="button" class="active" data-sort-direction="desc">Descending</button>
            <button type="button" data-sort-direction="asc">Ascending</button>
          </div>
        </div>

        <div class="result-area">
          <div class="result-header">
            <h3>Collection</h3>
            <span id="monsterCount">Monsters: 0</span>
          </div>
          <div class="card-row collection-grid" id="collectionList">
            <p class="empty-state">Summoned monsters will appear here.</p>
          </div>
        </div>
      </div>
    </section>

    <script src="game.js?v=2"></script>
  </body>
</html>
